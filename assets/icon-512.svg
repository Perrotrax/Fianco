<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121216"/>
      <stop offset="100%" stop-color="#060608"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d075"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- Background Card -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  <rect x="24" y="24" width="464" height="464" rx="90" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-opacity="0.3"/>
  
  <!-- Outer Gold Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="12" filter="url(#shadow)"/>
  
  <!-- Wallet / Money Icon -->
  <g transform="translate(136, 136) scale(0.47)" filter="url(#shadow)">
    <!-- Wallet Body -->
    <rect x="40" y="100" width="432" height="300" rx="36" fill="url(#goldGrad)"/>
    <path d="M 40 180 L 472 180" stroke="#0a0a0c" stroke-width="10" stroke-opacity="0.2"/>
    <!-- Wallet Flap -->
    <rect x="300" y="190" width="172" height="120" rx="24" fill="#121216" stroke="url(#goldGrad)" stroke-width="8"/>
    <!-- Gold Coin Button -->
    <circle cx="360" cy="250" r="24" fill="url(#goldGrad)"/>
    <text x="360" y="259" font-family="'Outfit', sans-serif" font-weight="900" font-size="28" fill="#0a0a0c" text-anchor="middle">$</text>
  </g>
</svg>
